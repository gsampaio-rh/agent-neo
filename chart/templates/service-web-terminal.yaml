apiVersion: v1
kind: Service
metadata:
  name: {{ include "neo.fullname" . }}-web-terminal
  labels:
    {{- include "neo.labels" . | nindent 4 }}
    app.kubernetes.io/component: web-terminal
spec:
  selector:
    {{- include "neo.selectorLabels" . | nindent 4 }}
  ports:
    - name: web-terminal
      port: {{ .Values.ports.webTerminal }}
      targetPort: {{ .Values.ports.webTerminal }}
      protocol: TCP
