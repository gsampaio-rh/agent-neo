apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "neo.fullname" . }}-web-terminal
  labels:
    {{- include "neo.labels" . | nindent 4 }}
    app.kubernetes.io/component: web-terminal
spec:
  to:
    kind: Service
    name: {{ include "neo.fullname" . }}-web-terminal
    weight: 100
  port:
    targetPort: web-terminal
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
