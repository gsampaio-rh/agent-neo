{{- if and .Values.config.telemetry.enabled (eq .Values.config.telemetry.metricsExporter "prometheus") .Values.metrics.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "neo.fullname" . }}-agent
  labels:
    {{- include "neo.labels" . | nindent 4 }}
    {{- with .Values.metrics.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "neo.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: agent-metrics
  endpoints:
    - port: otel-metrics
      interval: {{ .Values.metrics.interval | default "30s" }}
{{- end }}
