apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "neo.fullname" . }}-config
  labels:
    {{- include "neo.labels" . | nindent 4 }}
data:
  ANTHROPIC_BASE_URL: {{ required "config.anthropicBaseUrl is required" .Values.config.anthropicBaseUrl | quote }}
  ANTHROPIC_DEFAULT_SONNET_MODEL: {{ .Values.config.modelName | quote }}
  ANTHROPIC_DEFAULT_OPUS_MODEL: {{ .Values.config.modelName | quote }}
  ANTHROPIC_DEFAULT_HAIKU_MODEL: {{ .Values.config.modelName | quote }}
  ANTHROPIC_AUTH_TOKEN: "not-needed"
  CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
  CLAUDE_CODE_SKIP_FAST_MODE_NETWORK_ERRORS: "1"
  CLAUDE_CODE_ATTRIBUTION_HEADER: "0"
  CLAUDE_CODE_MAX_OUTPUT_TOKENS: {{ .Values.config.maxOutputTokens | quote }}
  MAX_THINKING_TOKENS: {{ .Values.config.maxThinkingTokens | quote }}
  CLAUDE_PERMISSION_MODE: {{ .Values.config.permissionMode | quote }}
  {{- if .Values.config.enableTasks }}
  CLAUDE_CODE_ENABLE_TASKS: "1"
  {{- end }}
  {{- if .Values.config.taskListId }}
  CLAUDE_CODE_TASK_LIST_ID: {{ .Values.config.taskListId | quote }}
  {{- end }}
  {{- if .Values.config.telemetry.enabled }}
  CLAUDE_CODE_ENABLE_TELEMETRY: "1"
  OTEL_METRICS_EXPORTER: {{ .Values.config.telemetry.metricsExporter | quote }}
  OTEL_LOGS_EXPORTER: {{ .Values.config.telemetry.logsExporter | quote }}
  {{- if eq .Values.config.telemetry.metricsExporter "prometheus" }}
  OTEL_EXPORTER_PROMETHEUS_PORT: {{ .Values.config.telemetry.prometheusPort | quote }}
  {{- end }}
  {{- if ne .Values.config.telemetry.tracesExporter "none" }}
  CLAUDE_CODE_ENHANCED_TELEMETRY_BETA: "1"
  OTEL_TRACES_EXPORTER: {{ .Values.config.telemetry.tracesExporter | quote }}
  {{- end }}
  {{- if .Values.config.telemetry.otlp.endpoint }}
  OTEL_EXPORTER_OTLP_PROTOCOL: {{ .Values.config.telemetry.otlp.protocol | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.config.telemetry.otlp.endpoint | quote }}
  {{- end }}
  {{- if .Values.config.telemetry.otlp.headers }}
  OTEL_EXPORTER_OTLP_HEADERS: {{ .Values.config.telemetry.otlp.headers | quote }}
  {{- end }}
  OTEL_METRIC_EXPORT_INTERVAL: {{ .Values.config.telemetry.exportInterval.metrics | quote }}
  OTEL_LOGS_EXPORT_INTERVAL: {{ .Values.config.telemetry.exportInterval.logs | quote }}
  {{- if .Values.config.telemetry.logDetails }}
  OTEL_LOG_TOOL_DETAILS: "1"
  {{- end }}
  {{- end }}
