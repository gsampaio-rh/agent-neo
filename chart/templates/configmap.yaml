apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "neo.fullname" . }}-config
  labels:
    {{- include "neo.labels" . | nindent 4 }}
data:
  ANTHROPIC_BASE_URL: {{ required "config.anthropicBaseUrl is required" .Values.config.anthropicBaseUrl | quote }}
  ANTHROPIC_DEFAULT_SONNET_MODEL: {{ .Values.config.modelName | quote }}
  ANTHROPIC_DEFAULT_OPUS_MODEL: {{ .Values.config.modelName | quote }}
  ANTHROPIC_DEFAULT_HAIKU_MODEL: {{ .Values.config.modelName | quote }}
  ANTHROPIC_AUTH_TOKEN: "not-needed"
  CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
  CLAUDE_CODE_SKIP_FAST_MODE_NETWORK_ERRORS: "1"
  CLAUDE_CODE_ATTRIBUTION_HEADER: "0"
  CLAUDE_CODE_MAX_OUTPUT_TOKENS: {{ .Values.config.maxOutputTokens | quote }}
  MAX_THINKING_TOKENS: {{ .Values.config.maxThinkingTokens | quote }}
  CLAUDE_PERMISSION_MODE: {{ .Values.config.permissionMode | quote }}
  {{- if .Values.config.enableTasks }}
  CLAUDE_CODE_ENABLE_TASKS: "1"
  {{- end }}
  {{- if .Values.config.taskListId }}
  CLAUDE_CODE_TASK_LIST_ID: {{ .Values.config.taskListId | quote }}
  {{- end }}
